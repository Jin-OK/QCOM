name: Build QCOM

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtserialport'
          
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        
      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"
        
      - name: Build
        run: cmake --build build
        
      - name: Deploy
        run: |
          cd build
          windeployqt --release --no-translations QCOM.exe
          
      - name: Package
        run: |
          mkdir package
          xcopy build\QCOM.exe package\ /Y
          xcopy build\*.dll package\ /Y
          xcopy build\platforms package\platforms\ /Y /I
          xcopy build\styles package\styles\ /Y /I 2>nul || echo No styles
          cd package
          7z a QCOM-windows-x64.zip *
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QCOM-windows-x64
          path: package/QCOM-windows-x64.zip

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          modules: 'qtserialport'
          
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}" -DCMAKE_OSX_ARCHITECTURES="arm64"
        
      - name: Build
        run: cmake --build build
        
      - name: Create DMG
        run: |
          cd build
          mkdir -p dmg_temp
          cp -r QCOM.app dmg_temp/
          ln -sf /Applications dmg_temp/Applications
          hdiutil create -volname "QCOM" -srcfolder dmg_temp -ov -format UDZO QCOM-macos-arm64.dmg
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QCOM-macos-arm64
          path: build/QCOM-macos-arm64.dmg

  build-macos-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          modules: 'qtserialport'
          
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"
        
      - name: Build
        run: cmake --build build
        
      - name: Create DMG
        run: |
          cd build
          mkdir -p dmg_temp
          cp -r QCOM.app dmg_temp/
          ln -sf /Applications dmg_temp/Applications
          hdiutil create -volname "QCOM" -srcfolder dmg_temp -ov -format UDZO QCOM-macos-x64.dmg
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QCOM-macos-x64
          path: build/QCOM-macos-x64.dmg

  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Qt6
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev qt6-base-dev-tools qt6-serialport-dev cmake build-essential
          
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
        
      - name: Build
        run: cmake --build build
        
      - name: Package
        run: |
          cd build
          tar -czvf QCOM-linux-x64.tar.gz QCOM
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QCOM-linux-x64
          path: build/QCOM-linux-x64.tar.gz

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Qt6
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev qt6-base-dev-tools qt6-serialport-dev cmake build-essential
          
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
        
      - name: Build
        run: cmake --build build
        
      - name: Package
        run: |
          cd build
          tar -czvf QCOM-linux-arm64.tar.gz QCOM
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QCOM-linux-arm64
          path: build/QCOM-linux-arm64.tar.gz

  release:
    needs: [build-windows, build-macos-arm64, build-macos-x64, build-linux-x64, build-linux-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/QCOM-windows-x64/QCOM-windows-x64.zip
            artifacts/QCOM-macos-arm64/QCOM-macos-arm64.dmg
            artifacts/QCOM-macos-x64/QCOM-macos-x64.dmg
            artifacts/QCOM-linux-x64/QCOM-linux-x64.tar.gz
            artifacts/QCOM-linux-arm64/QCOM-linux-arm64.tar.gz
          body: |
            ## QCOM v${{ github.ref_name }}
            
            ### 下载说明
            
            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Windows x64 | QCOM-windows-x64.zip | Windows 64位，解压后运行 QCOM.exe |
            | macOS ARM64 | QCOM-macos-arm64.dmg | M1/M2/M3芯片 |
            | macOS x64 | QCOM-macos-x64.dmg | Intel芯片Mac |
            | Linux x64 | QCOM-linux-x64.tar.gz | Linux 64位 |
            | Linux ARM64 | QCOM-linux-arm64.tar.gz | 树莓派等ARM设备 |
            
            ### 使用方法
            
            **Windows**: 解压后运行 QCOM.exe
            
            **macOS**: 双击 dmg 安装，首次运行如提示"已损坏"，请在终端执行：
            ```bash
            sudo xattr -cr /Applications/QCOM.app
            ```
            
            **Linux**: 解压后运行 `./QCOM`